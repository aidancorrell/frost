name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross (aarch64 linux)
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --profile release-lto --target ${{ matrix.target }} -p frost-cli -p frost-mcp
          else
            cargo build --profile release-lto --target ${{ matrix.target }} -p frost-cli -p frost-mcp
          fi
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          v="${{ needs.create-release.outputs.version }}"
          t="${{ matrix.target }}"
          name="frost-${v}-${t}"
          mkdir -p "dist/${name}"
          cp target/${t}/release-lto/frost "dist/${name}/"
          cp target/${t}/release-lto/frost-mcp "dist/${name}/"
          cp README.md LICENSE CHANGELOG.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = "${{ needs.create-release.outputs.version }}"
          $t = "${{ matrix.target }}"
          $name = "frost-$v-$t"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/$t/release-lto/frost.exe" "dist/$name/"
          Copy-Item "target/$t/release-lto/frost-mcp.exe" "dist/$name/"
          Copy-Item README.md,LICENSE,CHANGELOG.md "dist/$name/"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip"
          Get-FileHash -Algorithm SHA256 "dist/$name.zip" | Select-Object -ExpandProperty Hash | Out-File "dist/$name.zip.sha256" -Encoding ascii
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ needs.create-release.outputs.version }}
          files: dist/*

  docker:
    name: Docker image → GHCR
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
