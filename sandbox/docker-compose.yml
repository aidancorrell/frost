# Local development environment for frost.
#
# Provides:
#   - Apache Spark with Iceberg support
#   - Iceberg REST catalog
#   - MinIO (S3-compatible storage)
#
# Usage:
#   docker compose up -d
#   docker compose exec spark-iceberg spark-sql
#
# Then generate pathological tables:
#   docker compose exec spark-iceberg spark-submit /opt/sandbox/generate_pathologies.py

services:
  minio:
    image: minio/minio
    container_name: frost-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 admin password;
      mc mb -p local/warehouse;
      exit 0;
      "

  rest-catalog:
    image: tabulario/iceberg-rest
    container_name: frost-rest-catalog
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1

  spark-iceberg:
    image: tabulario/spark-iceberg
    container_name: frost-spark
    depends_on:
      - rest-catalog
      - minio
    ports:
      - "8888:8888"  # Jupyter
      - "8080:8080"  # Spark UI
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    volumes:
      - ./generate_pathologies.py:/opt/sandbox/generate_pathologies.py

volumes:
  minio-data:
